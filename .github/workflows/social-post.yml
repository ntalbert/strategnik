name: Social Post (Every Other Day)

on:
  schedule:
    # Every other day at 3:00pm UTC (8:00am PT)
    # GitHub cron doesn't support "every 2 days" natively,
    # so we run daily and the script checks if there's a post queued.
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/social/requirements.txt

      - name: Post to LinkedIn and X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        working-directory: scripts/social
        run: python3 post_social.py

      - name: Commit posted state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/social/queue/
          git diff --cached --quiet || git commit -m "Social post: $(date +%Y-%m-%d)"
          git push
